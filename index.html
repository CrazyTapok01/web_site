<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrazyTapok | Supabase Music</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root { --bg: #05020a; --glass: rgba(20, 15, 30, 0.7); --primary: #d900ff; --secondary: #5e00ff; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; background-image: radial-gradient(circle at 10% 20%, rgba(94,0,255,0.15), transparent 40%); }
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem 1rem; }
        
        /* Auth Styles */
        .auth-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 100; 
            display: flex; align-items: center; justify-content: center; 
        }
        
        .auth-box { 
            background: #111; border: 1px solid #333; padding: 2rem; 
            border-radius: 1.5rem; width: 90%; max-width: 400px; text-align: center; 
            box-shadow: 0 0 30px rgba(217, 0, 255, 0.1);
        }
        .logo { font-family: 'Orbitron'; font-size: 2rem; margin-bottom: 1.5rem; } 
        .logo span { color: var(--primary); }
        
        input, select { 
            width: 100%; padding: 1rem; margin-bottom: 1rem; 
            background: #05020a; border: 1px solid #333; 
            border-radius: 0.8rem; color: white; outline: none; 
        }
        
        .btn { 
            width: 100%; padding: 1rem; border: none; border-radius: 0.8rem; 
            background: linear-gradient(45deg, var(--secondary), var(--primary)); 
            color: white; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; 
        }
        .btn:disabled { opacity: 0.7; cursor: wait; }

        /* App Interface */
        .app-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        .upload-section { 
            background: var(--glass); padding: 1.5rem; border-radius: 1rem; 
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 2rem; display: none; 
        }
        .track-list { display: flex; flex-direction: column; gap: 1rem; }
        
        .track-card { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            padding: 1rem; border-radius: 1rem; display: flex; align-items: center; 
            gap: 1rem; transition: 0.2s; 
        }
        .track-card:hover { border-color: var(--primary); transform: translateX(5px); }
        
        .play-btn { 
            width: 45px; height: 45px; border-radius: 50%; 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            color: white; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; transition: 0.2s;
        }
        .play-btn:hover { background: var(--primary); border-color: var(--primary); }
        
        .track-info { flex: 1; } 
        .track-title { font-weight: bold; } 
        .track-meta { font-size: 0.8rem; color: #888; margin-top: 0.2rem; }
        
        .delete-btn { 
            background: none; border: none; color: #ff4444; 
            cursor: pointer; font-size: 1.1rem; padding: 0.5rem;
        }

        /* Player Bar */
        .player-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(5, 2, 10, 0.95); backdrop-filter: blur(10px); 
            border-top: 1px solid rgba(255,255,255,0.1); padding: 1rem 2rem; 
            display: flex; align-items: center; gap: 1.5rem; 
            transform: translateY(100%); transition: 0.4s; z-index: 50; 
        }
        .player-bar.visible { transform: translateY(0); }
        
        .progress-container { 
            position: absolute; top: -2px; left: 0; width: 100%; 
            height: 4px; background: #222; cursor: pointer; 
        }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.1s linear; }
        
        .visualizer { 
            flex: 1; height: 30px; display: flex; align-items: flex-end; 
            justify-content: center; gap: 2px; 
        }
        .bar { width: 3px; background: var(--primary); border-radius: 2px; height: 5px; transition: height 0.1s ease; }
        
        .toast { 
            position: fixed; top: 20px; right: 20px; 
            background: #1a1a1a; border-left: 4px solid var(--primary); 
            padding: 1rem 2rem; border-radius: 0.5rem; 
            transform: translateX(200%); transition: 0.4s; z-index: 200; 
        }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <!-- AUTH MODAL -->
    <div class="auth-overlay" id="authModal">
        <div class="auth-box">
            <div class="logo">CRAZY<span>TAPOK</span></div>
            
            <select id="roleSelect">
                <option value="listener"> Слушатель</option>
                <option value="producer">🎛️ Продюсер</option>
            </select>
            
            <div id="loginFields">
                <input type="text" id="usernameInput" placeholder="Введите ваш никнейм">
                
                <!-- Поле для ключа продюсера (изначально скрыто) -->
                <div id="adminKeyField" style="display:none;">
                    <input type="password" id="adminKeyInput" placeholder="Секретный ключ продюсера">
                </div>
            </div>
            
            <button class="btn" onclick="handleLogin()" id="loginBtn">ВОЙТИ В СИСТЕМУ</button>
            <div id="errorMsg" style="color:#ff4444; margin-top:1rem; font-size:0.9rem;"></div>
        </div>
    </div>

    <!-- MAIN APP CONTENT -->
    <div class="container" id="appContent" style="display:none;">
        <div class="app-header">
            <div>
                <h1 style="font-family:'Orbitron'">Music Hub</h1>
                <div style="color:#888; font-size:0.9rem;">Powered by Supabase</div>
            </div>
            <div style="background:rgba(255,255,255,0.1); padding:0.5rem 1rem; border-radius:2rem; font-size:0.9rem; display:flex; align-items:center; gap:0.5rem;">
                <i class="fas fa-user-circle"></i> <span id="userNameDisplay">User</span>
                <button onclick="logout()" style="background:none; border:none; color:#666; cursor:pointer; margin-left:10px;"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <!-- Upload Section (Visible only for Producer) -->
        <div id="uploadSection" class="upload-section">
            <h3 style="margin-bottom:1rem;"><i class="fas fa-cloud-upload-alt"></i> Загрузка в облако</h3>
            <div style="display:flex; gap:1rem; flex-wrap:wrap;">
                <input type="text" id="trackTitle" placeholder="Название трека" style="flex:2; margin:0;">
                <input type="file" id="trackFile" accept="audio/*" style="flex:2; margin:0;">
                <button class="btn" style="width:auto; padding:0 2rem;" onclick="uploadTrack()" id="uploadBtn">Загрузить</button>
            </div>
        </div>

        <!-- Track List -->
        <div class="track-list" id="trackList">
            <div style="text-align:center; padding:2rem; color:#666;">
                <i class="fas fa-spinner fa-spin fa-2x"></i><br>Загрузка библиотеки...
            </div>
        </div>
    </div>

    <!-- PLAYER BAR -->
    <div class="player-bar" id="playerBar">
        <div class="progress-container" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
        <button class="play-btn" onclick="togglePlay()" id="mainPlayBtn"><i class="fas fa-play"></i></button>
        <div style="width:150px;">
            <div id="playerTitle" style="font-weight:bold; font-size:0.9rem;">Track Name</div>
            <div id="playerTime" style="font-size:0.7rem; color:#888;">00:00 / 00:00</div>
        </div>
        <div class="visualizer" id="visualizer"></div>
    </div>

    <div class="toast" id="toast">Notification</div>

    <script>
        // 🔥 SUPABASE CONFIG
        const SUPABASE_URL = 'https://giwbzwndnubccyntbtwb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdpd2J6d25kbnViY2N5bnRidHdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTU5NDUsImV4cCI6MjA5NTg5MTk0NX0.-cU65iiadhKyzcT2Z5KQUqrdBoyxLtIIvcSpXq0oYVU';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = null;
        let tracks = [];
        let audio = new Audio();
        let isPlaying = false;
        let currentId = null;

        // ================= ПРОСТАЯ ЛОГИКА АВТОРИЗАЦИИ =================
        
        // Функция для переключения видимости поля ключа
        function checkRole() {
            const role = document.getElementById('roleSelect').value;
            const adminField = document.getElementById('adminKeyField');
            const nameInput = document.getElementById('usernameInput');
            
            if (role === 'producer') {
                adminField.style.display = 'block';
                nameInput.value = 'CrazyTapok';
                nameInput.disabled = true;
            } else {
                adminField.style.display = 'none';
                nameInput.value = '';
                nameInput.disabled = false;
            }
        }

        // Привязываем функцию к изменению селекта
        document.getElementById('roleSelect').addEventListener('change', checkRole);
        
        // Вызываем сразу при загрузке, чтобы скрыть поле если выбран слушатель
        checkRole();

        function handleLogin() {
            const role = document.getElementById('roleSelect').value;
            const name = document.getElementById('usernameInput').value.trim();
            const key = document.getElementById('adminKeyInput').value;
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.textContent = '';

            if (role === 'producer') {
                if (key !== "CRAZYTAPOK2026") {
                    errorMsg.textContent = "❌ Неверный секретный ключ!";
                    return;
                }
                user = { name: "CrazyTapok", role: "producer" };
            } else {
                if (!name) {
                    errorMsg.textContent = "❌ Введите ваше имя!";
                    return;
                }
                user = { name: name, role: "listener" };
            }

            // Скрываем модальное окно
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
            document.getElementById('userNameDisplay').textContent = user.name;
            
            if (user.role === 'producer') {
                document.getElementById('uploadSection').style.display = 'block';
            }

            loadTracksFromSupabase();
        }

        function logout() {
            location.reload();
        }

        // ================= SUPABASE FUNCTIONS =================

        async function loadTracksFromSupabase() {
            try {
                const { data, error } = await supabase
                    .from('tracks')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                tracks = data || [];
                renderTracks();
            } catch (e) {
                console.error("Ошибка загрузки:", e);
                document.getElementById('trackList').innerHTML = '<div style="text-align:center; color:#ff4444; padding:2rem;">Ошибка подключения к базе данных.</div>';
            }
        }

        async function uploadTrack() {
            const title = document.getElementById('trackTitle').value;
            const file = document.getElementById('trackFile').files[0];
            const btn = document.getElementById('uploadBtn');

            if (!title || !file) { 
                showToast("Заполните название и выберите файл", true); 
                return; 
            }

            btn.disabled = true;
            btn.textContent = "Загрузка...";

            try {
                const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
                const { error: storageError } = await supabase.storage
                    .from('music')
                    .upload(fileName, file);

                if (storageError) throw storageError;

                const { data: urlData } = supabase.storage.from('music').getPublicUrl(fileName);
                const publicUrl = urlData.publicUrl;

                const { error: dbError } = await supabase
                    .from('tracks')
                    .insert([
                        { 
                            title: title, 
                            url: publicUrl, 
                            size: (file.size / 1024 / 1024).toFixed(2) + ' MB',
                            created_at: new Date().toISOString()
                        }
                    ]);

                if (dbError) throw dbError;

                showToast("✅ Трек успешно опубликован!");
                document.getElementById('trackTitle').value = '';
                document.getElementById('trackFile').value = '';
                loadTracksFromSupabase();

            } catch (error) {
                console.error(error);
                showToast(" Ошибка: " + error.message, true);
            } finally {
                btn.disabled = false;
                btn.textContent = "Загрузить";
            }
        }

        async function deleteTrack(id, fileName) {
            if (!confirm("Удалить трек?")) return;
            try {
                await supabase.from('tracks').delete().eq('id', id);
                if(fileName) await supabase.storage.from('music').remove([fileName]);
                showToast("Трек удален");
                loadTracksFromSupabase();
            } catch (e) {
                showToast("Ошибка удаления", true);
            }
        }

        // ================= PLAYER & UI =================

        function renderTracks() {
            const container = document.getElementById('trackList');
            if (tracks.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:2rem; color:#555;">Библиотека пуста</div>';
                return;
            }

            container.innerHTML = tracks.map(t => `
                <div class="track-card">
                    <button class="play-btn" onclick="playTrack('${t.id}', '${t.url}', '${t.title.replace(/'/g, "\\'")}')">
                        <i class="fas ${currentId === t.id && isPlaying ? 'fa-pause' : 'fa-play'}"></i>
                    </button>
                    <div class="track-info">
                        <div class="track-title">${escapeHtml(t.title)}</div>
                        <div class="track-meta">${t.size}</div>
                    </div>
                    ${user?.role === 'producer' ? `<button class="delete-btn" onclick="deleteTrack('${t.id}', '${t.url.split('/').pop()}')"><i class="fas fa-trash"></i></button>` : ''}
                </div>
            `).join('');
        }

        function playTrack(id, url, title) {
            if (currentId === id) {
                togglePlay();
                return;
            }
            
            audio.src = url;
            audio.play();
            currentId = id;
            isPlaying = true;
            
            document.getElementById('playerBar').classList.add('visible');
            document.getElementById('playerTitle').textContent = title;
            updatePlayBtn();
            renderTracks();
            initVisualizer();
        }

        function togglePlay() {
            if (!currentId) return;
            if (audio.paused) {
                audio.play();
                isPlaying = true;
            } else {
                audio.pause();
                isPlaying = false;
            }
            updatePlayBtn();
            renderTracks();
        }

        function updatePlayBtn() {
            const icon = document.querySelector('#mainPlayBtn i');
            icon.className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        }

        audio.addEventListener('timeupdate', () => {
            if(!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = `${pct}%`;
            document.getElementById('playerTime').textContent = 
                `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        });

        document.getElementById('progressBar').addEventListener('click', (e) => {
            if (!audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        });

        let audioCtx, analyser, source;
        function initVisualizer() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64;
                
                const cont = document.getElementById('visualizer');
                cont.innerHTML = '';
                for(let i=0; i<30; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'bar';
                    cont.appendChild(bar);
                }
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            requestAnimationFrame(renderFrame);
        }

        function renderFrame() {
            if (!isPlaying) return;
            requestAnimationFrame(renderFrame);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            const bars = document.querySelectorAll('.bar');
            bars.forEach((bar, i) => {
                const h = Math.max(5, (dataArray[i] / 255) * 30);
                bar.style.height = `${h}px`;
            });
        }

        function showToast(msg, err=false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.borderLeftColor = err ? '#ff3333' : '#00ffaa';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function escapeHtml(text) {
            return text.replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' })[m]);
        }

        function formatTime(sec) {
            if (!sec) return "00:00";
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }
    </script>
</body>
</html>
