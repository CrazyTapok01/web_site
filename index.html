<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrazyTapok | Music Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-dark: #030105;
            --panel-bg: rgba(15, 10, 25, 0.85);
            --border-light: rgba(255, 255, 255, 0.1);
            --primary: #d900ff;
            --primary-dim: rgba(217, 0, 255, 0.3);
            --secondary: #5e00ff;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --danger: #ef4444;
            --success: #10b981;
            --font-main: 'Inter', sans-serif;
            --font-display: 'Orbitron', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- REACTIVE CYBER GRID BACKGROUND --- */
        .cyber-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #2a0e45 0%, #000000 100%);
            perspective: 800px;
            overflow: hidden;
        }

        .grid-floor {
            position: absolute;
            width: 200%; height: 200%;
            top: 40%; left: -50%;
            background-image: 
                linear-gradient(var(--primary) 1px, transparent 1px),
                linear-gradient(90deg, var(--primary) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: rotateX(60deg);
            opacity: 0.4;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 90%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 90%);
            background-position: 0 0; 
        }

        .particles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--secondary) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.15;
            animation: particleFloat 40s linear infinite;
        }

        @keyframes particleFloat {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .glow-top {
            position: absolute; top: -30%; left: 50%; transform: translateX(-50%);
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(217,0,255,0.25) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* --- LAYOUT & GLASSMORPHISM --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .app-container {
            max-width: 1200px; margin: 0 auto; padding: 2rem;
            display: grid; grid-template-columns: 320px 1fr; gap: 2.5rem;
            min-height: 100vh; position: relative; z-index: 1;
        }

        .glass-card {
            background: var(--panel-bg);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .sidebar { position: sticky; top: 2rem; height: fit-content; }
        .profile-header { text-align: center; margin-bottom: 2rem; }
        
        .avatar-wrapper {
            width: 140px; height: 140px; margin: 0 auto 1.5rem;
            position: relative; border-radius: 50%;
            padding: 5px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            box-shadow: 0 0 30px var(--primary-dim);
        }
        .avatar-img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 4px solid var(--bg-dark); background: #111;
        }
        
        .user-name { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 0.5rem; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .user-badge { 
            display: inline-block; padding: 0.4rem 1rem; border-radius: 20px;
            background: rgba(217, 0, 255, 0.15); color: var(--primary);
            font-size: 0.75rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
            border: 1px solid rgba(217, 0, 255, 0.3);
            box-shadow: 0 0 10px var(--primary-dim);
        }

        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
            margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border-light);
        }
        .stat-box { text-align: center; }
        .stat-val { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; display: block; }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .main-area { display: flex; flex-direction: column; gap: 2rem; }
        
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .section-title {
            font-family: var(--font-display); font-size: 1.4rem; font-weight: 700;
            display: flex; align-items: center; gap: 1rem;
        }
        .section-title i { color: var(--primary); font-size: 1.2rem; filter: drop-shadow(0 0 5px var(--primary)); }

        .upload-dropzone {
            border: 2px dashed var(--border-light); border-radius: 20px;
            padding: 3rem 2rem; text-align: center; cursor: pointer;
            transition: all 0.3s ease; background: rgba(0,0,0,0.3);
            position: relative; overflow: hidden;
        }
        .upload-dropzone:hover {
            border-color: var(--primary); background: rgba(217, 0, 255, 0.05);
            box-shadow: inset 0 0 20px var(--primary-dim);
        }
        .upload-dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .upload-icon { font-size: 3rem; color: var(--text-muted); margin-bottom: 1rem; transition: 0.3s; }
        .upload-dropzone:hover .upload-icon { color: var(--primary); transform: translateY(-5px); }

        .track-item {
            display: flex; align-items: center; gap: 1.2rem;
            padding: 1.2rem; border-radius: 16px;
            background: rgba(255,255,255,0.03); border: 1px solid transparent;
            transition: all 0.2s ease; margin-bottom: 1rem;
        }
        .track-item:hover {
            background: rgba(255,255,255,0.08); border-color: var(--border-light);
            transform: translateX(5px);
        }
        .track-item.active {
            background: linear-gradient(90deg, var(--primary-dim), transparent);
            border-left: 4px solid var(--primary);
            box-shadow: 0 0 15px rgba(217, 0, 255, 0.1);
        }
        
        .play-circle {
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            color: white; cursor: pointer; transition: 0.2s; font-size: 1.2rem;
            flex-shrink: 0;
        }
        .play-circle:hover { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }
        
        .track-details { flex: 1; min-width: 0; }
        .track-name { font-weight: 600; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-info-sub { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.3rem; }

        .action-btn {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; padding: 0.8rem; border-radius: 50%; transition: 0.2s;
        }
        .action-btn:hover { color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        .player-dock {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(5, 2, 10, 0.95); backdrop-filter: blur(30px);
            border-top: 1px solid var(--border-light);
            padding: 1rem 2.5rem; display: flex; align-items: center; gap: 2rem;
            transform: translateY(100%); transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 100;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .player-dock.visible { transform: translateY(0); }

        .progress-bar-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: #222; cursor: pointer;
        }
        .progress-bar-fill {
            height: 100%; background: var(--primary); width: 0%;
            box-shadow: 0 0 10px var(--primary);
        }

        .player-controls { display: flex; align-items: center; gap: 2rem; }
        .ctrl-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 1.4rem; transition: 0.2s; opacity: 0.8; }
        .ctrl-btn:hover { opacity: 1; color: var(--primary); transform: scale(1.1); }
        .ctrl-main { font-size: 2.8rem; opacity: 1; }
        .ctrl-main:hover { color: var(--primary); text-shadow: 0 0 20px var(--primary); }

        .visualizer { flex: 1; height: 40px; display: flex; align-items: flex-end; justify-content: center; gap: 4px; }
        .v-bar { width: 4px; background: var(--primary); border-radius: 2px; height: 4px; transition: height 0.1s ease; opacity: 0.8; box-shadow: 0 0 5px var(--primary); }

        .auth-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.4s;
        }
        .auth-overlay.active { opacity: 1; pointer-events: all; }
        
        .auth-card {
            background: #111; border: 1px solid #333; padding: 3rem;
            border-radius: 30px; width: 90%; max-width: 450px; text-align: center;
            box-shadow: 0 0 60px rgba(217, 0, 255, 0.2);
            transform: scale(0.95); transition: 0.4s;
        }
        .auth-overlay.active .auth-card { transform: scale(1); }

        .brand-logo { font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 2.5rem; letter-spacing: 2px; }
        .brand-logo span { color: var(--primary); text-shadow: 0 0 15px var(--primary); }

        .input-group { margin-bottom: 1.5rem; text-align: left; }
        .custom-input {
            width: 100%; padding: 1.2rem; background: #050505; border: 1px solid #333;
            border-radius: 12px; color: white; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .custom-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-dim); }

        .btn-glow {
            width: 100%; padding: 1.2rem; border: none; border-radius: 12px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            color: white; font-weight: 700; font-size: 1.1rem; cursor: pointer;
            font-family: var(--font-display); letter-spacing: 1px;
            transition: 0.3s; box-shadow: 0 4px 15px var(--primary-dim);
        }
        .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-dim); }

        .toast {
            position: fixed; top: 30px; right: 30px; background: #1a1a1a;
            border-left: 4px solid var(--primary); padding: 1.2rem 2rem;
            border-radius: 8px; transform: translateX(150%); transition: 0.4s; z-index: 2000;
            font-weight: 500; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translateX(0); }

        /* =========================================
           📱 MOBILE ADAPTIVE STYLES
           ========================================= */
        @media (max-width: 1024px) {
            .app-container { 
                grid-template-columns: 1fr; 
                padding: 1.5rem; 
                padding-bottom: 140px; /* Место для плеера */
                gap: 1.5rem;
            }

            .sidebar { 
                position: static; 
                width: 100%;
            }

            .glass-card {
                padding: 1.5rem;
            }

            .avatar-wrapper {
                width: 100px; height: 100px;
            }

            .user-name { font-size: 1.5rem; }
            
            .stats-grid {
                margin-top: 1.5rem;
                padding-top: 1.5rem;
            }

            /* Адаптация плеера для мобильных */
            .player-dock {
                padding: 0.8rem 1rem;
                flex-wrap: wrap; /* Разрешаем перенос элементов */
                justify-content: space-between;
                gap: 0.5rem;
            }

            .player-controls {
                order: 2; /* Кнопки по центру */
                width: 100%;
                justify-content: center;
                margin-top: 0.5rem;
                gap: 1.5rem;
            }

            .player-info {
                order: 1;
                width: calc(100% - 40px); /* Ширина минус кнопка громкости */
                margin-bottom: 0.2rem;
            }

            .visualizer {
                order: 3;
                width: 100%;
                height: 25px;
                margin-top: 0.5rem;
                opacity: 0.7;
            }

            /* Скрываем ползунок громкости на мобильных для экономии места, или делаем его компактным */
            .player-dock > div:last-child {
                display: none; 
            }

            .ctrl-main { font-size: 2.2rem; }
            .ctrl-btn { font-size: 1.2rem; }

            .track-item {
                padding: 1rem;
            }
            
            .play-circle {
                width: 40px; height: 40px; font-size: 1rem;
            }

            .upload-dropzone {
                padding: 2rem 1rem;
            }
        }

        /* Для очень маленьких экранов */
        @media (max-width: 380px) {
            .user-name { font-size: 1.3rem; }
            .stat-val { font-size: 1.2rem; }
            .brand-logo { font-size: 2rem; }
            .auth-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- DYNAMIC BACKGROUND -->
    <div class="cyber-bg">
        <div class="glow-top"></div>
        <div class="grid-floor" id="gridFloor"></div>
        <div class="particles"></div>
    </div>

    <!-- AUTH -->
    <div class="auth-overlay active" id="authModal">
        <div class="auth-card">
            <div class="brand-logo">CRAZY<span>TAPOK</span></div>
            
            <div class="input-group">
                <select id="roleSelect" class="custom-input" style="cursor: pointer;" onchange="toggleRoleFields()">
                    <option value="listener">🎧 Слушатель</option>
                    <option value="producer">🎛️ Продюсер</option>
                </select>
            </div>
            
            <div id="loginFields">
                <div class="input-group">
                    <input type="text" id="usernameInput" class="custom-input" placeholder="Ваш никнейм">
                </div>
                <div class="input-group" id="adminKeyField" style="display:none;">
                    <input type="password" id="adminKeyInput" class="custom-input" placeholder="Секретный ключ доступа">
                </div>
            </div>

            <button class="btn-glow" onclick="handleLogin()">ВОЙТИ В СИСТЕМУ</button>
        </div>
    </div>

    <!-- APP -->
    <div class="app-container" id="appInterface" style="opacity: 0; transition: 1s;">
        <aside class="sidebar">
            <div class="glass-card profile-header">
                <div class="avatar-wrapper">
                    <img src="https://ui-avatars.com/api/?name=User&background=333&color=fff&size=200" id="profileAvatar" class="avatar-img" alt="Avatar">
                </div>
                <h2 class="user-name" id="profileName">User</h2>
                <div class="user-badge" id="profileRole">Listener</div>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="stat-val" id="statTracks">0</span>
                        <span class="stat-label">Треков</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-val" id="statSize">0 MB</span>
                        <span class="stat-label">Объем</span>
                    </div>
                </div>
                
                <button class="btn-glow" style="margin-top: 2rem; background: #222; border: 1px solid #444; box-shadow: none;" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>

        <main class="main-area">
            <div id="uploadSection" class="glass-card" style="display: none;">
                <div class="section-header">
                    <div class="section-title"><i class="fas fa-cloud-upload-alt"></i> Загрузка трека</div>
                </div>
                <div class="upload-dropzone">
                    <input type="file" id="trackFileInput" accept="audio/*">
                    <div class="upload-icon"><i class="fas fa-music"></i></div>
                    <h3>Перетащите файл сюда</h3>
                    <p style="color: #666; font-size: 0.9rem; margin-top: 0.5rem;">или кликните для выбора (MP3, WAV, FLAC)</p>
                </div>
                <div style="margin-top: 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap;">
                    <input type="text" id="trackTitleInput" class="custom-input" placeholder="Название композиции" style="margin:0; flex: 1;">
                    <button class="btn-glow" style="width: auto; padding: 0 1.5rem;" onclick="addTrack()" id="addTrackBtn">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>

            <div class="glass-card" style="flex: 1; min-height: 400px;">
                <div class="section-header">
                    <div class="section-title"><i class="fas fa-compact-disc"></i> Библиотека музыки</div>
                </div>
                <div class="track-list" id="trackListContainer"></div>
            </div>
        </main>
    </div>

    <!-- PLAYER DOCK -->
    <div class="player-dock" id="playerBar">
        <div class="progress-bar-bg" id="progressBarContainer">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        
        <div class="player-info">
            <div id="playerTitle" style="font-weight: 600; font-size: 1rem; margin-bottom: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Нет трека</div>
            <div id="playerTime" style="font-size: 0.75rem; color: var(--text-muted);">00:00 / 00:00</div>
        </div>

        <div class="player-controls">
            <button class="ctrl-btn" onclick="prevTrack()"><i class="fas fa-step-backward"></i></button>
            <button class="ctrl-btn ctrl-main" id="playPauseBtn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
            <button class="ctrl-btn" onclick="nextTrack()"><i class="fas fa-step-forward"></i></button>
        </div>

        <div class="visualizer" id="visualizer"></div>

        <div style="display:flex; align-items:center; gap:0.8rem; width: 120px;">
            <i class="fas fa-volume-up" style="color:#666;"></i>
            <input type="range" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)" style="width:100%; accent-color:var(--primary); height: 4px;">
        </div>
    </div>

    <div class="toast" id="toast">Notification</div>

<script>
    // ================= CONFIG =================
    const ADMIN_KEY = "14evgenii22809"; 
    const SUPABASE_URL = 'https://giwbzwndnubccyntbtwb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdpd2J6d25kbnViY2N5bnRidHdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTU5NDUsImV4cCI6MjA5NTg5MTk0NX0.-cU65iiadhKyzcT2Z5KQUqrdBoyxLtIIvcSpXq0oYVU';
    
    const PRODUCER_AVATAR_URL = 'https://1s4oyld5dc.ucarecd.net/78c10222-d5aa-45cd-9dad-aab4ab36f79e/';
    const LISTENER_AVATAR_URL = 'https://1s4oyld5dc.ucarecd.net/78c10222-d5aa-45cd-9dad-aab4ab36f79e/';

    let supabaseClient;
    let user = { name: "Guest", role: "listener" };
    let tracks = [];
    
    let audio = new Audio();
    audio.crossOrigin = "anonymous";
    let currentTrackId = null;
    let isPlaying = false;
    let audioContext, analyser, source;
    let isAudioSetup = false;

    // Переменные для анимации фона
    let gridOffset = 0;
    let gridSpeed = 0.5;
    const gridElement = document.getElementById('gridFloor');

    window.onload = function() {
        if (typeof window.supabase === 'undefined') {
            alert("Ошибка сети: Библиотека Supabase не загрузилась.");
            return;
        }
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        document.getElementById('profileAvatar').src = LISTENER_AVATAR_URL;
        toggleRoleFields();
        requestAnimationFrame(animateBackground);
    };

    function animateBackground() {
        if (isPlaying && analyser) {
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            let bassSum = 0;
            for(let i = 0; i < 10; i++) bassSum += dataArray[i];
            let bassAverage = bassSum / 10;
            gridSpeed = 0.5 + (bassAverage / 255) * 4.5;
        } else {
            gridSpeed = 0.5;
        }
        gridOffset += gridSpeed;
        if (gridOffset > 60) gridOffset = 0; 
        gridElement.style.backgroundPosition = `0 ${gridOffset}px`;
        requestAnimationFrame(animateBackground);
    }

    function toggleRoleFields() {
        const role = document.getElementById('roleSelect').value;
        const adminField = document.getElementById('adminKeyField');
        const userField = document.getElementById('usernameInput');
        const avatarImg = document.getElementById('profileAvatar');

        if (role === 'producer') {
            adminField.style.display = 'block';
            userField.value = 'CrazyTapok';
            userField.disabled = true;
            avatarImg.src = PRODUCER_AVATAR_URL;
        } else {
            adminField.style.display = 'none';
            userField.value = '';
            userField.disabled = false;
            avatarImg.src = LISTENER_AVATAR_URL;
        }
    }

    async function handleLogin() {
        if (!supabaseClient) return;
        const role = document.getElementById('roleSelect').value;
        const name = document.getElementById('usernameInput').value.trim();
        const avatarImg = document.getElementById('profileAvatar');
        
        if (role === 'producer') {
            if (document.getElementById('adminKeyInput').value !== ADMIN_KEY) {
                showToast(" Неверный ключ доступа", true);
                return;
            }
            avatarImg.src = PRODUCER_AVATAR_URL;
        } else if (!name) {
            showToast(" Введите имя", true);
            return;
        } else {
            avatarImg.src = LISTENER_AVATAR_URL;
        }

        user = { name: role === 'producer' ? 'CrazyTapok' : name, role: role };
        document.getElementById('authModal').classList.remove('active');
        document.getElementById('appInterface').style.opacity = '1';
        setupUI();
        loadTracks();
    }

    function setupUI() {
        document.getElementById('profileName').textContent = user.name;
        document.getElementById('profileRole').textContent = user.role === 'producer' ? 'PRODUCER / ADMIN' : 'LISTENER';
        if (user.role === 'producer') document.getElementById('uploadSection').style.display = 'block';
    }

    function logout() { location.reload(); }

    async function loadTracks() {
        if (!supabaseClient) return;
        try {
            const { data, error } = await supabaseClient.from('tracks').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            tracks = data || [];
            renderTracks();
            updateStats();
        } catch (e) {
            console.error(e);
            showToast("Ошибка загрузки треков", true);
        }
    }

    function renderTracks() {
        const container = document.getElementById('trackListContainer');
        container.innerHTML = '';
        if (tracks.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:4rem; color:#555;"><i class="fas fa-music" style="font-size:3rem; margin-bottom:1rem; opacity:0.5;"></i><br>Библиотека пуста</div>`;
            return;
        }
        tracks.forEach(track => {
            const isActive = track.id == currentTrackId;
            const div = document.createElement('div');
            div.className = `track-item ${isActive ? 'active' : ''}`;
            div.innerHTML = `
                <div class="play-circle" onclick="playTrack(${track.id})">
                    <i class="fas ${isActive && isPlaying ? 'fa-pause' : 'fa-play'}"></i>
                </div>
                <div class="track-details">
                    <div class="track-name">${escapeHtml(track.title)}</div>
                    <div class="track-info-sub">${track.size || 'Unknown Size'} • Added recently</div>
                </div>
                ${user.role === 'producer' ? `<button class="action-btn" onclick="deleteTrack(${track.id})"><i class="fas fa-trash-alt"></i></button>` : ''}
            `;
            container.appendChild(div);
        });
    }

    async function addTrack() {
        const titleIn = document.getElementById('trackTitleInput');
        const fileIn = document.getElementById('trackFileInput');
        const btn = document.getElementById('addTrackBtn');
        const file = fileIn.files[0];
        const title = titleIn.value.trim();
        if (!file || !title) { showToast("Заполните все поля", true); return; }
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        try {
            const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
            const { error: storageError } = await supabaseClient.storage.from('music').upload(fileName, file);
            if (storageError) throw storageError;
            const { data: urlData } = supabaseClient.storage.from('music').getPublicUrl(fileName);
            const { error: dbError } = await supabaseClient.from('tracks').insert([{ title: title, url: urlData.publicUrl, size: (file.size / 1024 / 1024).toFixed(2) + ' MB', created_at: new Date().toISOString() }]);
            if (dbError) throw dbError;
            showToast("✅ Трек успешно добавлен!");
            titleIn.value = ''; fileIn.value = '';
            loadTracks();
        } catch (e) { showToast("❌ Ошибка: " + e.message, true); } 
        finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-plus"></i>'; }
    }

    async function deleteTrack(id) {
        if(!confirm("Удалить?")) return;
        if(currentTrackId == id) { audio.pause(); document.getElementById('playerBar').classList.remove('visible'); currentTrackId = null; }
        await supabaseClient.from('tracks').delete().eq('id', id);
        loadTracks();
    }

    function setupAudioContext() {
        if (isAudioSetup) return;
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioContext();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 64;
            const container = document.getElementById('visualizer');
            container.innerHTML = '';
            for(let i=0; i<40; i++) {
                const bar = document.createElement('div');
                bar.className = 'v-bar';
                container.appendChild(bar);
            }
            isAudioSetup = true;
        } catch (e) { console.error("Audio Error:", e); }
    }

    function playTrack(id) {
        setupAudioContext();
        if (audioContext && audioContext.state === 'suspended') audioContext.resume();
        const track = tracks.find(t => t.id == id);
        if (!track) return;
        if (currentTrackId == id) { togglePlay(); return; }
        audio.src = track.url;
        audio.volume = 1.0;
        audio.play().then(() => {
            currentTrackId = id;
            isPlaying = true;
            document.getElementById('playerBar').classList.add('visible');
            document.getElementById('playerTitle').textContent = track.title;
            updatePlayBtn();
            renderTracks();
            renderFrame();
        }).catch(e => { console.error("Play Error:", e); showToast("Не удалось воспроизвести", true); });
    }

    function togglePlay() {
        if (!currentTrackId) return;
        if (audioContext && audioContext.state === 'suspended') audioContext.resume();
        if (audio.paused) { audio.play(); isPlaying = true; }
        else { audio.pause(); isPlaying = false; }
        updatePlayBtn();
        renderTracks();
    }

    function updatePlayBtn() {
        const icon = document.querySelector('#playPauseBtn i');
        icon.className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
    }

    function nextTrack() {
        const idx = tracks.findIndex(t => t.id == currentTrackId);
        if (idx > -1 && idx < tracks.length - 1) playTrack(tracks[idx + 1].id);
    }

    function prevTrack() {
        const idx = tracks.findIndex(t => t.id == currentTrackId);
        if (idx > 0) playTrack(tracks[idx - 1].id);
    }

    function setVolume(val) { audio.volume = val; }

    audio.addEventListener('timeupdate', () => {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progressFill').style.width = `${pct}%`;
        document.getElementById('playerTime').textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration || 0)}`;
    });

    document.getElementById('progressBarContainer').addEventListener('click', (e) => {
        if (!audio.duration) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pct * audio.duration;
    });

    audio.addEventListener('ended', () => {
        isPlaying = false;
        updatePlayBtn();
        renderTracks();
        nextTrack();
    });

    function renderFrame() {
        if (!isPlaying || !analyser) return;
        requestAnimationFrame(renderFrame);
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        const bars = document.querySelectorAll('.v-bar');
        bars.forEach((bar, i) => {
            const val = dataArray[i] || 0;
            const height = Math.max(4, (val / 255) * 40);
            bar.style.height = `${height}px`;
            bar.style.background = `hsl(${val + 280}, 100%, 60%)`;
        });
    }

    function showToast(msg, err=false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.borderLeftColor = err ? '#ef4444' : '#10b981';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function formatSize(bytes) { return bytes ? (bytes / (1024*1024)).toFixed(1) + ' MB' : '0 MB'; }
    function formatTime(sec) {
        if (!sec) return "00:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
    }
    function escapeHtml(text) { return text.replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' })[m]); }
    function updateStats() {
        document.getElementById('statTracks').textContent = tracks.length;
        const totalSize = tracks.reduce((acc, t) => acc + (t.size ? parseFloat(t.size) : 0), 0);
        document.getElementById('statSize').textContent = totalSize.toFixed(1) + ' MB';
    }
</script>
</body>
</html>
