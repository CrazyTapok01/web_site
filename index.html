<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrazyTapok | Sonic Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --bg-dark: #05020a;
            --glass-surface: rgba(20, 15, 35, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #d900ff;
            --primary-glow: rgba(217, 0, 255, 0.4);
            --secondary: #5e00ff;
            --text-main: #ffffff;
            --text-muted: #8b8b9e;
            --danger: #ff2a2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(94, 0, 255, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(217, 0, 255, 0.1), transparent 25%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .app-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            min-height: 100vh;
        }

        @media (max-width: 900px) {
            .app-wrapper { grid-template-columns: 1fr; padding-bottom: 100px; }
        }

        .glass-panel {
            background: var(--glass-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Sidebar */
        .sidebar { position: sticky; top: 1.5rem; height: fit-content; }
        .profile-card { text-align: center; }
        .avatar-container {
            width: 120px; height: 120px; margin: 0 auto 1rem; position: relative;
            border-radius: 50%; padding: 4px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .avatar-img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            background: #111; border: 3px solid var(--bg-dark);
        }
        .user-name { font-family: 'Orbitron'; font-size: 1.4rem; margin-bottom: 0.2rem; }
        .user-role { color: var(--primary); font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
        
        .stats-row {
            display: flex; justify-content: space-around; margin-top: 1.5rem;
            padding-top: 1rem; border-top: 1px solid var(--glass-border);
        }
        .stat-item h4 { font-size: 1.2rem; font-family: 'Orbitron'; }
        .stat-item p { font-size: 0.7rem; color: var(--text-muted); }

        /* Main Content */
        .main-content { display: flex; flex-direction: column; gap: 1.5rem; }
        .section-title { font-family: 'Orbitron'; font-size: 1.2rem; display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; }
        .section-title i { color: var(--primary); }

        /* Upload */
        .upload-zone {
            border: 2px dashed var(--glass-border); border-radius: 1rem;
            padding: 2rem; text-align: center; transition: 0.3s; cursor: pointer;
            position: relative; background: rgba(0,0,0,0.2);
        }
        .upload-zone:hover { border-color: var(--primary); background: rgba(217, 0, 255, 0.05); }
        .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .upload-icon { font-size: 2rem; color: var(--text-muted); margin-bottom: 0.5rem; }

        /* Tracks */
        .track-list { display: flex; flex-direction: column; gap: 1rem; }
        .track-card {
            display: flex; align-items: center; gap: 1rem;
            background: rgba(255,255,255,0.02); border: 1px solid transparent;
            padding: 1rem; border-radius: 1rem; transition: 0.2s;
        }
        .track-card:hover { background: rgba(255,255,255,0.05); border-color: var(--glass-border); }
        .track-card.active { border-color: var(--primary); background: linear-gradient(90deg, rgba(217,0,255,0.1), transparent); }

        .play-btn {
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--glass-surface); border: 1px solid var(--glass-border);
            color: white; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; font-size: 1.1rem;
        }
        .play-btn:hover { background: var(--primary); border-color: var(--primary); }
        .track-info { flex: 1; min-width: 0; }
        .track-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }
        
        .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.5rem; }
        .btn-icon.delete:hover { color: var(--danger); }

        /* Player Bar */
        .player-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(5, 2, 10, 0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border); padding: 1rem 2rem;
            display: flex; align-items: center; gap: 2rem; z-index: 50;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .player-bar.visible { transform: translateY(0); }

        .visualizer-container { flex: 1; height: 40px; display: flex; align-items: flex-end; justify-content: center; gap: 3px; }
        .bar { width: 4px; background: var(--primary); border-radius: 2px; height: 5px; transition: height 0.1s ease; }

        .player-info { width: 200px; }
        .player-controls { display: flex; align-items: center; gap: 1.5rem; }
        .ctrl-btn { background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; }
        .ctrl-btn.main { font-size: 2rem; color: var(--primary); }
        
        .progress-container { position: absolute; top: -2px; left: 0; width: 100%; height: 4px; background: #222; cursor: pointer; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; }

        /* Auth Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .auth-box {
            background: #111; border: 1px solid #333; padding: 2.5rem;
            border-radius: 1.5rem; width: 90%; max-width: 400px; text-align: center;
        }
        .logo { font-family: 'Orbitron'; font-size: 2rem; margin-bottom: 2rem; color: white; }
        .logo span { color: var(--primary); }
        .input-field {
            width: 100%; padding: 1rem; margin-bottom: 1rem; background: #050505;
            border: 1px solid #333; border-radius: 0.8rem; color: white; outline: none;
        }
        .btn-primary {
            width: 100%; padding: 1rem; border: none; border-radius: 0.8rem;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            color: white; font-weight: bold; cursor: pointer; font-family: 'Orbitron';
        }
        
        .toast {
            position: fixed; top: 20px; right: 20px; background: #1a1a1a;
            border-left: 4px solid var(--primary); padding: 1rem 1.5rem;
            border-radius: 0.5rem; transform: translateX(200%); transition: 0.4s; z-index: 200;
        }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <!-- AUTH -->
    <div class="modal-overlay active" id="authModal">
        <div class="auth-box">
            <div class="logo">CRAZY<span>TAPOK</span></div>
            <select id="roleSelect" class="input-field" style="cursor: pointer;">
                <option value="listener">🎧 Слушатель</option>
                <option value="producer">🎛️ Продюсер</option>
            </select>
            
            <div id="loginFields">
                <input type="text" id="usernameInput" class="input-field" placeholder="Введите ваш никнейм">
                <div id="adminKeyField" style="display:none;">
                    <input type="password" id="adminKeyInput" class="input-field" placeholder="Секретный ключ">
                </div>
            </div>

            <button class="btn-primary" onclick="handleLogin()">ВОЙТИ В СИСТЕМУ</button>
        </div>
    </div>

    <!-- APP -->
    <div class="app-wrapper" id="appInterface" style="opacity: 0; transition: 1s;">
        <aside class="sidebar">
            <div class="glass-panel profile-card">
                <div class="avatar-container">
                    <img src="https://via.placeholder.com/150/000000/FFFFFF/?text=CT" id="profileAvatar" class="avatar-img">
                </div>
                <h2 class="user-name" id="profileName">User</h2>
                <div class="user-role" id="profileRole">Listener</div>
                <div class="stats-row">
                    <div class="stat-item"><h4 id="statTracks">0</h4><p>Треков</p></div>
                    <div class="stat-item"><h4 id="statSize">0 MB</h4><p>Объем</p></div>
                </div>
                <button class="btn-primary" style="margin-top: 1.5rem; background: #222;" onclick="logout()">Выйти</button>
            </div>
        </aside>

        <main class="main-content">
            <div id="uploadSection" class="glass-panel" style="display: none;">
                <div class="section-title"><i class="fas fa-cloud-upload-alt"></i> Студия загрузки</div>
                <div class="upload-zone">
                    <input type="file" id="trackFileInput" accept="audio/*">
                    <div class="upload-icon"><i class="fas fa-music"></i></div>
                    <h3>Кликни или перетащи файл</h3>
                    <p style="color: #666; font-size: 0.8rem;">WAV, FLAC, MP3 (до 100MB)</p>
                </div>
                <div style="margin-top: 1rem; display: flex; gap: 1rem;">
                    <input type="text" id="trackTitleInput" class="input-field" placeholder="Название композиции..." style="margin:0;">
                    <button class="btn-primary" style="width: auto; padding: 0 2rem;" onclick="addTrack()" id="addTrackBtn">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>

            <div class="glass-panel" style="flex: 1;">
                <div class="section-title"><i class="fas fa-compact-disc"></i> Библиотека</div>
                <div class="track-list" id="trackListContainer"></div>
            </div>
        </main>
    </div>

    <!-- PLAYER BAR -->
    <div class="player-bar" id="playerBar">
        <div class="progress-container" id="progressBarContainer">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="player-info">
            <div class="player-title" id="playerTitle">Нет трека</div>
            <div style="font-size: 0.7rem; color: #888;" id="playerTime">00:00 / 00:00</div>
        </div>
        <div class="player-controls">
            <button class="ctrl-btn" onclick="prevTrack()"><i class="fas fa-step-backward"></i></button>
            <button class="ctrl-btn main" id="playPauseBtn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
            <button class="ctrl-btn" onclick="nextTrack()"><i class="fas fa-step-forward"></i></button>
        </div>
        <div class="visualizer-container" id="visualizer"></div>
        <div style="display:flex; align-items:center; gap:0.5rem; width: 100px;">
            <i class="fas fa-volume-up" style="color:#666; font-size:0.8rem;"></i>
            <input type="range" min="0" max="1" step="0.1" value="1" oninput="setVolume(this.value)" style="width:100%; accent-color:var(--primary);">
        </div>
    </div>

    <div class="toast" id="toast">Message</div>

<script>
    // ================= CONFIG =================
    const ADMIN_KEY = "CRAZYTAPOK2026";
    const SUPABASE_URL = 'https://giwbzwndnubccyntbtwb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdpd2J6d25kbnViY2N5bnRidHdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTU5NDUsImV4cCI6MjA5NTg5MTk0NX0.-cU65iiadhKyzcT2Z5KQUqrdBoyxLtIIvcSpXq0oYVU';
    
    let supabaseClient;
    let user = { name: "Guest", role: "listener", avatar: null };
    let tracks = [];
    
    // Player State
    let audio = new Audio();
    let currentTrackId = null;
    let isPlaying = false;
    let audioContext, analyser, source;

    // ================= INIT =================
    window.onload = function() {
        if (window.supabase) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log("Supabase initialized");
        } else {
            console.error("Supabase library failed to load!");
        }
        
        // Логика переключения полей из старого кода
        document.getElementById('roleSelect').addEventListener('change', (e) => {
            const isAdmin = e.target.value === 'producer';
            document.getElementById('adminKeyField').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('usernameInput').value = isAdmin ? 'CrazyTapok' : '';
        });
    };

    // ================= AUTH & PROFILE =================
    async function handleLogin() {
        const role = document.getElementById('roleSelect').value;
        const name = document.getElementById('usernameInput').value.trim();
        
        if (role === 'producer') {
            if (document.getElementById('adminKeyInput').value !== ADMIN_KEY) {
                showToast(" Неверный ключ доступа", true);
                return;
            }
        } else if (!name) {
            showToast("⛔ Введите имя", true);
            return;
        }

        user = { 
            name: role === 'producer' ? 'CrazyTapok' : name, 
            role: role,
            avatar: null 
        };

        document.getElementById('authModal').classList.remove('active');
        document.getElementById('appInterface').style.opacity = '1';
        setupUI();
        loadTracks();
    }

    function setupUI() {
        document.getElementById('profileName').textContent = user.name;
        document.getElementById('profileRole').textContent = user.role === 'producer' ? 'PRODUCER / ADMIN' : 'LISTENER';
        
        if (user.avatar) {
            document.getElementById('profileAvatar').src = user.avatar;
        }

        if (user.role === 'producer') {
            document.getElementById('uploadSection').style.display = 'block';
        }
    }

    function logout() { location.reload(); }

    // ================= TRACKS LOGIC =================
    async function loadTracks() {
        try {
            const { data, error } = await supabaseClient
                .from('tracks')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;
            tracks = data || [];
            renderTracks();
            updateStats();
        } catch (e) {
            console.error("Ошибка загрузки:", e);
            showToast("Ошибка подключения к базе данных", true);
        }
    }

    function renderTracks() {
        const container = document.getElementById('trackListContainer');
        container.innerHTML = '';

        if (tracks.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:2rem; color:#444;">
                <i class="fas fa-ghost fa-2x"></i><br>Библиотека пуста
            </div>`;
            return;
        }

        tracks.forEach(track => {
            const isActive = track.id === currentTrackId;
            const div = document.createElement('div');
            div.className = `track-card ${isActive ? 'active' : ''}`;
            div.innerHTML = `
                <button class="play-btn" onclick="playTrack('${track.id}')">
                    <i class="fas ${isActive && isPlaying ? 'fa-pause' : 'fa-play'}"></i>
                </button>
                <div class="track-info">
                    <div class="track-title">${escapeHtml(track.title)}</div>
                    <div class="track-meta">
                        <span>${track.size || 'N/A'}</span>
                    </div>
                </div>
                ${user.role === 'producer' ? `
                <button class="btn-icon delete" onclick="deleteTrack('${track.id}')">
                    <i class="fas fa-trash"></i>
                </button>` : ''}
            `;
            container.appendChild(div);
        });
    }

    async function addTrack() {
        const titleIn = document.getElementById('trackTitleInput');
        const fileIn = document.getElementById('trackFileInput');
        const btn = document.getElementById('addTrackBtn');
        
        const file = fileIn.files[0];
        const title = titleIn.value.trim();

        if (!file || !title) {
            showToast("Выберите файл и введите название", true);
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        showToast("Обработка файла...");

        try {
            const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
            const { error: storageError } = await supabaseClient.storage
                .from('music')
                .upload(fileName, file);

            if (storageError) throw storageError;

            const { data: urlData } = supabaseClient.storage.from('music').getPublicUrl(fileName);
            const publicUrl = urlData.publicUrl;

            const { error: dbError } = await supabaseClient
                .from('tracks')
                .insert([
                    { 
                        title: title, 
                        url: publicUrl, 
                        size: (file.size / 1024 / 1024).toFixed(2) + ' MB',
                        created_at: new Date().toISOString()
                    }
                ]);

            if (dbError) throw dbError;

            showToast("✅ Трек успешно добавлен!");
            titleIn.value = '';
            fileIn.value = '';
            loadTracks();
        } catch (e) {
            console.error(e);
            showToast("❌ Ошибка: " + e.message, true);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-plus"></i>';
        }
    }

    async function deleteTrack(id) {
        if(!confirm("Удалить навсегда?")) return;
        if(currentTrackId === id) {
            audio.pause();
            document.getElementById('playerBar').classList.remove('visible');
            currentTrackId = null;
        }
        await supabaseClient.from('tracks').delete().eq('id', id);
        loadTracks();
        showToast("Трек удален");
    }

    // ================= PLAYER ENGINE =================
    function playTrack(id) {
        const track = tracks.find(t => t.id === id);
        if (!track) return;

        if (currentTrackId === id) {
            togglePlay();
            return;
        }

        audio.src = track.url;
        audio.play().then(() => {
            currentTrackId = id;
            isPlaying = true;
            document.getElementById('playerBar').classList.add('visible');
            document.getElementById('playerTitle').textContent = track.title;
            updatePlayBtn();
            renderTracks();
            initVisualizer();
        }).catch(e => showToast("Ошибка воспроизведения", true));
    }

    function togglePlay() {
        if (!currentTrackId) return;
        if (audio.paused) {
            audio.play();
            isPlaying = true;
        } else {
            audio.pause();
            isPlaying = false;
        }
        updatePlayBtn();
        renderTracks();
    }

    function updatePlayBtn() {
        const icon = document.querySelector('#playPauseBtn i');
        icon.className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
    }

    function nextTrack() {
        const idx = tracks.findIndex(t => t.id === currentTrackId);
        if (idx > -1 && idx < tracks.length - 1) playTrack(tracks[idx + 1].id);
    }

    function prevTrack() {
        const idx = tracks.findIndex(t => t.id === currentTrackId);
        if (idx > 0) playTrack(tracks[idx - 1].id);
    }

    function setVolume(val) { audio.volume = val; }

    audio.addEventListener('timeupdate', () => {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progressFill').style.width = `${pct}%`;
        document.getElementById('playerTime').textContent = 
            `${formatTime(audio.currentTime)} / ${formatTime(audio.duration || 0)}`;
    });

    document.getElementById('progressBarContainer').addEventListener('click', (e) => {
        if (!audio.duration) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pct * audio.duration;
    });

    audio.addEventListener('ended', () => {
        isPlaying = false;
        updatePlayBtn();
        renderTracks();
        nextTrack();
    });

    // ================= VISUALIZER =================
    function initVisualizer() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 64;
            
            const container = document.getElementById('visualizer');
            container.innerHTML = '';
            for(let i=0; i<30; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar';
                container.appendChild(bar);
            }
        }
        if (audioContext.state === 'suspended') audioContext.resume();
        renderFrame();
    }

    function renderFrame() {
        if (!isPlaying) return;
        requestAnimationFrame(renderFrame);
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);
        
        const bars = document.querySelectorAll('.bar');
        bars.forEach((bar, i) => {
            const val = dataArray[i] || 0;
            const height = Math.max(4, (val / 255) * 40);
            bar.style.height = `${height}px`;
            bar.style.background = `hsl(${val + 280}, 100%, 60%)`;
        });
    }

    // ================= UTILS =================
    function showToast(msg, err=false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.borderLeftColor = err ? '#ff2a2a' : '#00ffaa';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function formatSize(bytes) {
        if (!bytes) return '0 MB';
        return (bytes / (1024*1024)).toFixed(1) + ' MB';
    }

    function formatTime(sec) {
        if (!sec) return "00:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
    }

    function escapeHtml(text) {
        return text.replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' })[m]);
    }

    function updateStats() {
        document.getElementById('statTracks').textContent = tracks.length;
        const totalSize = tracks.reduce((acc, t) => acc + (t.size ? parseFloat(t.size) : 0), 0);
        document.getElementById('statSize').textContent = totalSize.toFixed(1) + ' MB';
    }
</script>
</body>
</html>
